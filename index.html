<!DOCTYPE html>
<html>
<head>
  <title>Frac Pump Tracker (Shift + Stage + Standby + Logs)</title>
  <meta charset="utf-8" />
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; padding:16px; }
    h1 { text-align:center; margin:6px 0 2px; }
    .sub { text-align:center; color:#bbb; margin:0 0 12px; font-size:13px; }

    .toolbar{
      display:flex; gap:10px; flex-wrap:wrap;
      justify-content:center;
      margin-bottom:12px;
    }
    button{
      padding:7px 10px;
      cursor:pointer;
      border-radius:8px;
      border:1px solid #444;
      background:#222; color:#fff;
      font-size:12px;
    }
    button:hover{ background:#2a2a2a; }

    .top-panels{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      margin-bottom:12px;
    }
    .panel{
      background:#151515;
      border:1px solid #333;
      border-radius:12px;
      padding:10px;
    }
    .panel h3{ margin:0 0 8px 0; font-size:14px; }
    .kv{ display:flex; gap:10px; flex-wrap:wrap; font-size:12px; color:#ddd; }
    .kv span{ background:#1e1e1e; border:1px solid #2a2a2a; padding:6px 8px; border-radius:10px; }
    .muted{ color:#aaa; }

    .layout{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
    }
    .side{
      background:#151515;
      border:1px solid #333;
      border-radius:12px;
      padding:10px;
    }
    .side.low{ border:2px solid #0077ff; }
    .side.high{ border:2px solid #ff9900; }

    .side-title{
      text-align:center;
      font-weight:bold;
      font-size:18px;
      margin:4px 0 10px;
    }

    .stations{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:10px;
    }

    .station{
      background:#1a1a1a;
      border:1px solid #2a2a2a;
      border-radius:12px;
      padding:10px;
      min-height:170px;
    }

    .station-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:8px;
    }
    .station-title{
      font-weight:bold;
      font-size:13px;
      line-height:1.2;
    }
    .station-meta{
      font-size:11px;
      color:#888;
      text-align:right;
      white-space:nowrap;
    }
    .station-current{
      margin-top:4px;
      font-size:11px;
      color:#aaa;
    }

    .station-name-input{
      width:100%;
      padding:6px 8px;
      border-radius:10px;
      border:1px solid #333;
      background:#101010;
      color:#fff;
      font-size:12px;
      margin:8px 0 8px;
      box-sizing:border-box;
    }

    .dropzone{
      border:1px dashed #444;
      border-radius:10px;
      padding:8px;
      min-height:110px;
      background:#141414;
    }
    .dropzone.dragover{
      border-color:#66ff66;
      background:#101810;
    }

    .pump-card{
      background:#1e1e1e;
      border:1px solid #333;
      border-radius:12px;
      padding:10px;
      font-size:12px;
      user-select:none;
    }
    .pump-card.running{ border:2px solid lime; }
    .pump-card.offline{ border:2px solid #ffcc00; }
    .pump-card.pulled{ border:2px solid #ff4d4d; }

    .pump-card.warnsoon{ box-shadow: 0 0 0 2px rgba(255, 204, 0, 0.6) inset; }
    .pump-card.warnover{ box-shadow: 0 0 0 2px rgba(255, 77, 77, 0.7) inset; }

    .row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:6px; }
    .tiny{ font-size:11px; color:#aaa; }

    .pump-name-input{
      width:100%;
      padding:6px 8px;
      border-radius:10px;
      border:1px solid #333;
      background:#101010;
      color:#fff;
      font-size:12px;
      margin:8px 0 6px;
      box-sizing:border-box;
    }

    .maint{
      margin-top:10px;
      background:#141414;
      border:1px solid #2a2a2a;
      border-radius:12px;
      padding:8px;
    }
    .maint-grid{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:8px;
      margin-top:8px;
    }
    .box{
      background:#121212;
      border:1px solid #2a2a2a;
      border-radius:10px;
      padding:8px;
    }
    .box-title{ font-weight:bold; margin-bottom:6px; font-size:12px; }

    .item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      padding:6px 0;
      border-bottom:1px solid #222;
    }
    .item:last-child{ border-bottom:none; }
    .left{ display:flex; align-items:center; gap:8px; min-width:0; }
    .name{
      max-width:110px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    input[type="checkbox"]{ transform: scale(1.1); cursor:pointer; }
    .item button{ margin:0; padding:4px 8px; font-size:11px; }

    .logbox{
      margin-top:10px;
      background:#141414;
      border:1px solid #2a2a2a;
      border-radius:12px;
      padding:8px;
      max-height:140px;
      overflow:auto;
    }
    .logline{
      font-size:11px;
      color:#bbb;
      border-bottom:1px solid #222;
      padding:6px 0;
    }
    .logline:last-child{ border-bottom:none; }

    .footer{
      margin-top:10px;
      text-align:center;
      color:#777;
      font-size:11px;
    }

    @media (max-width: 1100px){
      .top-panels{ grid-template-columns: 1fr; }
      .layout{ grid-template-columns: 1fr; }
      .stations{ grid-template-columns: 1fr; }
      .maint-grid{ grid-template-columns: 1fr; }
      .name{ max-width: 220px; }
    }
  </style>
</head>
<body>

<h1>Frac Pump Tracker</h1>
<div class="sub">Shift totals • Stage counter • Standby pumps • Full history logs • Fixed Stations 1–24</div>

<div class="toolbar">
  <button onclick="startAll()">Start ALL</button>
  <button onclick="stopAll()">Stop ALL</button>
  <button onclick="newShift()">Start New Shift</button>
  <button onclick="stagePrev()">Stage -</button>
  <button onclick="stageNext()">Stage +</button>
  <button onclick="stageNote()">Stage Note</button>
  <button onclick="exportCSV()">Export CSV (Excel)</button>
  <button onclick="exportLogsCSV()">Export LOGS CSV</button>
  <button onclick="resetAllData()">Reset ALL Data (this browser)</button>
</div>

<div class="top-panels">
  <div class="panel">
    <h3>Shift Summary</h3>
    <div class="kv" id="shiftSummary"></div>
    <div class="tiny muted" id="shiftMeta"></div>
  </div>
  <div class="panel">
    <h3>Stage</h3>
    <div class="kv" id="stageSummary"></div>
    <div class="tiny muted" id="stageMeta"></div>
  </div>
</div>

<div class="layout">
  <div class="side low">
    <div class="side-title">LOW SIDE</div>
    <div class="stations" id="lowStations"></div>
  </div>

  <div class="side high">
    <div class="side-title">HIGH SIDE</div>
    <div class="stations" id="highStations"></div>
  </div>
</div>

<div class="footer">
  Station # is fixed. Pump name moves with pump. Drag a pump card to move/swap. All comments are saved in history logs with stage number.
</div>

<script>
/* ------------------ SETTINGS ------------------ */
const STORAGE_KEY = "frac_pump_tracker_shift_stage_standby_v1";

/* main stations */
const stationsPerSide = 12; // 12 low + 12 high = 24 fixed stations

/* standby slots per side (extra pumps that can be swapped in) */
const standbySlotsLow = 3;
const standbySlotsHigh = 3;

/* total pumps = 24 + standbyLow + standbyHigh */
const pumpCount = 24 + standbySlotsLow + standbySlotsHigh;

/* warnings */
const THRESH = { seat: 250, valve: 250, packing: 150 };
const WARN_WINDOW = 20;

/* ------------------ DATA MODEL ------------------ */
function createItems(label, count){
  return Array.from({length: count}, (_, i) => ({
    name: `${label} ${i+1}`,
    hours: 0,
    active: true,
    lastChangedBy: "",
    lastChangedAt: null,
    lastComment: ""
  }));
}

function createPump(id){
  return {
    id,
    pumpName: "",
    totalHours: 0,
    running: false,
    lastStart: null,
    status: "Stopped",         // Running / Stopped / Offline / PulledOut
    statusBy: "",
    statusComment: "",
    statusAt: null,

    /* where it sits (station key) */
    stationKey: null,

    /* per-shift counts */
    shiftCounts: { seats: 0, valves: 0, packings: 0 },

    /* component tracking */
    seats: createItems("Seat", 5),
    valves: createItems("Valve", 5),
    packings: createItems("Packing", 5),

    /* full history log */
    events: [] // {ts, stage, type, by, comment, details}
  };
}

function createStations(){
  const lowMain = Array.from({length: stationsPerSide}, (_, i) => ({
    key: `L${i+1}`,
    side: "Low",
    stationNum: i + 1,                  // 1–12
    name: `Low Location ${i+1}`,
    pumpId: (i + 1)
  }));

  const highMain = Array.from({length: stationsPerSide}, (_, i) => ({
    key: `H${i+1}`,
    side: "High",
    stationNum: i + 13,                 // 13–24
    name: `High Location ${i+1}`,
    pumpId: (i + 13)
  }));

  const lowStandby = Array.from({length: standbySlotsLow}, (_, i) => ({
    key: `LSB${i+1}`,
    side: "Low",
    stationNum: null,                   // standby = no fixed station number
    name: `Low Standby ${i+1}`,
    pumpId: (24 + i + 1)                // pumps 25..(24+standbyLow)
  }));

  const highStandby = Array.from({length: standbySlotsHigh}, (_, i) => ({
    key: `HSB${i+1}`,
    side: "High",
    stationNum: null,
    name: `High Standby ${i+1}`,
    pumpId: (24 + standbySlotsLow + i + 1)
  }));

  return {
    lowMain,
    highMain,
    lowStandby,
    highStandby
  };
}

let state = {
  pumps: Array.from({length: pumpCount}, (_, i) => createPump(i+1)),
  stations: createStations(),

  /* stage + shift */
  stage: { number: 1, notes: [] }, // notes: {ts, stage, by, comment}
  shift: { startedAt: Date.now(), seats: 0, valves: 0, packings: 0 },

  /* global event log (optional) */
  globalEvents: [] // {ts, stage, type, by, comment, details}
};

/* ------------------ PERSISTENCE ------------------ */
function save(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ console.warn("Save failed:", e); }
}

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const parsed = JSON.parse(raw);
    if(!parsed || !Array.isArray(parsed.pumps) || !parsed.stations) return;
    state = parsed;

    // patch stations if missing (older data)
    if(!state.stations.lowMain) state.stations = createStations();

    // patch stage/shift if missing
    state.stage ??= { number: 1, notes: [] };
    state.stage.number ??= 1;
    state.stage.notes ??= [];

    state.shift ??= { startedAt: Date.now(), seats: 0, valves: 0, packings: 0 };
    state.shift.startedAt ??= Date.now();
    state.shift.seats ??= 0;
    state.shift.valves ??= 0;
    state.shift.packings ??= 0;

    state.globalEvents ??= [];

    // patch pumps array length
    if(!Array.isArray(state.pumps) || state.pumps.length !== pumpCount){
      // rebuild but try to keep first 24 if they exist
      const rebuilt = Array.from({length: pumpCount}, (_, i) => createPump(i+1));
      if(Array.isArray(state.pumps)){
        for(let i=0; i<Math.min(state.pumps.length, rebuilt.length); i++){
          rebuilt[i] = Object.assign(rebuilt[i], state.pumps[i]);
        }
      }
      state.pumps = rebuilt;
    }

    // patch pumps fields
    state.pumps.forEach((p, idx) => {
      p.id ??= (idx+1);
      p.pumpName ??= "";
      p.totalHours ??= 0;
      p.running ??= false;
      p.lastStart ??= null;
      p.status ??= (p.running ? "Running" : "Stopped");
      p.statusBy ??= "";
      p.statusComment ??= "";
      p.statusAt ??= null;
      p.stationKey ??= null;

      p.shiftCounts ??= { seats: 0, valves: 0, packings: 0 };

      ["seats","valves","packings"].forEach(g=>{
        const label = g==="seats"?"Seat":g==="valves"?"Valve":"Packing";
        if(!Array.isArray(p[g]) || p[g].length !== 5){
          p[g] = createItems(label, 5);
        } else {
          p[g].forEach((it, i) => {
            it.name ??= `${label} ${i+1}`;
            it.hours ??= 0;
            it.active = (it.active !== false);
            it.lastChangedBy ??= "";
            it.lastChangedAt ??= null;
            it.lastComment ??= "";
          });
        }
      });

      p.events ??= [];
    });

  }catch(e){
    console.warn("Load failed:", e);
  }
}

/* ------------------ HELPERS ------------------ */
function fmt(h){ return (Math.round(h*100)/100).toFixed(2); }

function allStations(){
  const s = state.stations;
  return [...s.lowMain, ...s.highMain, ...s.lowStandby, ...s.highStandby];
}
function findStationByKey(key){ return allStations().find(x => x.key === key); }
function findPump(id){ return state.pumps.find(p => p.id === id); }

function currentTotal(p){
  if(!p.running) return p.totalHours;
  return p.totalHours + (Date.now() - p.lastStart) / (1000*60*60);
}

function addRunHours(p, hours){
  p.totalHours += hours;
  p.seats.forEach(x => { if(x.active) x.hours += hours; });
  p.valves.forEach(x => { if(x.active) x.hours += hours; });
  p.packings.forEach(x => { if(x.active) x.hours += hours; });
}

function classifyMaintenance(p){
  let overdue = 0, soon = 0;
  const check = (it, thresh) => {
    if(!it.active) return;
    const rem = thresh - it.hours;
    if(rem <= 0) overdue++;
    else if(rem <= WARN_WINDOW) soon++;
  };
  p.seats.forEach(it => check(it, THRESH.seat));
  p.valves.forEach(it => check(it, THRESH.valve));
  p.packings.forEach(it => check(it, THRESH.packing));
  return { overdue, soon };
}

function nowStr(ts){ return new Date(ts).toLocaleString(); }

/* ------------------ LOGGING ------------------ */
function addPumpEvent(pumpId, type, by, comment, details={}){
  const p = findPump(pumpId);
  if(!p) return;
  p.events.unshift({
    ts: Date.now(),
    stage: state.stage.number,
    type,
    by: (by || "").trim(),
    comment: (comment || "").trim(),
    details
  });
  if(p.events.length > 300) p.events.pop();
}

function addGlobalEvent(type, by, comment, details={}){
  state.globalEvents.unshift({
    ts: Date.now(),
    stage: state.stage.number,
    type,
    by: (by || "").trim(),
    comment: (comment || "").trim(),
    details
  });
  if(state.globalEvents.length > 500) state.globalEvents.pop();
}

/* ------------------ SHIFT + STAGE ------------------ */
function newShift(){
  const ok = confirm("Start a new shift? This resets shift counters (does not delete pump hours).");
  if(!ok) return;

  state.shift = { startedAt: Date.now(), seats: 0, valves: 0, packings: 0 };
  state.pumps.forEach(p => { p.shiftCounts = { seats: 0, valves: 0, packings: 0 }; });

  const by = prompt("Who started the new shift? (name/initials)", "") || "";
  addGlobalEvent("SHIFT_START", by, "New shift started", {});
  save();
  renderTopPanels();
  render(); // small change ok
}

function stageNext(){
  const by = prompt("Who changed the stage? (name/initials)", "") || "";
  state.stage.number += 1;
  addGlobalEvent("STAGE_CHANGE", by, `Stage -> ${state.stage.number}`, { stage: state.stage.number });
  save();
  renderTopPanels();
  render(); // update stage display
}

function stagePrev(){
  const by = prompt("Who changed the stage? (name/initials)", "") || "";
  state.stage.number = Math.max(1, state.stage.number - 1);
  addGlobalEvent("STAGE_CHANGE", by, `Stage -> ${state.stage.number}`, { stage: state.stage.number });
  save();
  renderTopPanels();
  render();
}

function stageNote(){
  const by = prompt("Who is adding a stage note? (name/initials)", "") || "";
  const note = prompt(`Stage ${state.stage.number} note/comment:`, "") || "";
  if(!note.trim()) return;
  state.stage.notes.unshift({ ts: Date.now(), stage: state.stage.number, by: by.trim(), comment: note.trim() });
  if(state.stage.notes.length > 200) state.stage.notes.pop();
  addGlobalEvent("STAGE_NOTE", by, note, {});
  save();
  renderTopPanels();
  render();
}

/* ------------------ PUMP RENAME ------------------ */
function editPumpName(pumpId, name){
  const p = findPump(pumpId);
  if(!p) return;
  p.pumpName = name;
  save();

  // update "Current Pump" label in the station header without full re-render
  const station = findStationByKey(p.stationKey);
  if(station){
    const el = document.getElementById(`currentPump-${station.key}`);
    if(el){
      el.textContent = p.pumpName ? p.pumpName : `Pump ${p.id}`;
    }
  }
}

/* ------------------ STATION LOCATION NAME ------------------ */
function editStationName(stationKey, newName){
  const s = findStationByKey(stationKey);
  if(!s) return;
  s.name = newName;
  save();
  // no render -> smooth typing
}

/* ------------------ START/STOP ALL ONLY ------------------ */
function startPumpById(id){
  const p = findPump(id);
  if(!p) return;
  if(p.status === "Offline" || p.status === "PulledOut") return;
  if(p.running) return;
  p.running = true;
  p.lastStart = Date.now();
  p.status = "Running";
  addPumpEvent(p.id, "START", "", "", {});
}
function stopPumpById(id){
  const p = findPump(id);
  if(!p) return;
  if(!p.running){
    if(p.status === "Running") p.status = "Stopped";
    return;
  }
  const hours = (Date.now() - p.lastStart) / (1000*60*60);
  addRunHours(p, hours);
  p.running = false;
  p.lastStart = null;
  if(p.status === "Running") p.status = "Stopped";
  addPumpEvent(p.id, "STOP", "", `+${fmt(hours)} hrs`, { addedHours: hours });
}

function startAll(){
  state.pumps.forEach(p => {
    // don’t auto-start standby pumps unless they’re placed into a station (optional rule)
    // We'll allow them to start if not Offline/PulledOut:
    if(p.status !== "Offline" && p.status !== "PulledOut") startPumpById(p.id);
  });
  save();
  render();           // status changes need UI refresh
  renderTopPanels();
}

function stopAll(){
  state.pumps.forEach(p => stopPumpById(p.id));
  save();
  render();
  renderTopPanels();
}

/* ------------------ STATUS + COMMENTS (saved forever) ------------------ */
function setStatus(pumpId, status){
  const p = findPump(pumpId);
  if(!p) return;

  if(p.running && status !== "Running") stopPumpById(p.id);

  const by = prompt(`Who is setting Pump ${p.id} to ${status}? (name/initials)`, p.statusBy || "") || "";
  let comment = p.statusComment || "";

  if(status === "Offline" || status === "PulledOut"){
    comment = prompt(`Reason/comment for Pump ${p.id} (${status}) [saved to history]:`, "") || "";
  } else if(status === "Stopped"){
    // optional comment
    const c2 = prompt(`Optional comment for Pump ${p.id} -> Stopped:`, "") || "";
    if(c2.trim()) comment = c2.trim();
  }

  p.status = status;
  p.statusBy = by.trim();
  p.statusComment = (comment || "").trim();
  p.statusAt = Date.now();

  addPumpEvent(p.id, "STATUS", by, `${status}${p.statusComment ? " — " + p.statusComment : ""}`, { status });

  if(status === "Running") startPumpById(p.id);

  save();
  render();
  renderTopPanels();
}

function backOnline(pumpId){
  const p = findPump(pumpId);
  if(!p) return;
  const by = prompt(`Who is putting Pump ${p.id} back online? (name/initials)`, "") || "";
  p.status = "Stopped";
  p.statusBy = by.trim();
  p.statusComment = "";
  p.statusAt = Date.now();
  addPumpEvent(p.id, "BACK_ONLINE", by, "Back online", {});
  save();
  render();
  renderTopPanels();
}

/* ------------------ MAINTENANCE + SHIFT COUNTS ------------------ */
function toggleActive(pumpId, group, idx, checked){
  const p = findPump(pumpId);
  p[group][idx].active = checked;
  save();
  render(); // refresh warning counts/styles
}

function incShiftCounter(group){
  // group is "seats"|"valves"|"packings"
  if(group === "seats") state.shift.seats += 1;
  if(group === "valves") state.shift.valves += 1;
  if(group === "packings") state.shift.packings += 1;
}

function resetItem(pumpId, group, idx){
  const p = findPump(pumpId);
  const it = p[group][idx];

  const by = prompt(`Who changed ${it.name} on Pump ${p.id}? (name/initials)`, "") || "";
  const comment = prompt(`Comment (part #, reason, what happened) [saved to history]:`, it.lastComment || "") || "";

  it.hours = 0;
  it.lastChangedBy = by.trim();
  it.lastChangedAt = Date.now();
  it.lastComment = (comment || "").trim();

  // shift totals
  incShiftCounter(group);
  p.shiftCounts[group] += 1;

  addPumpEvent(p.id, "MAINT_RESET", by, `${group.toUpperCase()} ${it.name} reset — ${it.lastComment}`, {
    group,
    item: it.name
  });

  save();
  renderTopPanels();
  render();
}

/* ------------------ DRAG & DROP (with history) ------------------ */
let dragPumpId = null;

function onDragStart(pumpId){ dragPumpId = pumpId; }
function onDragEnd(){ dragPumpId = null; }
function onDragOver(ev){ ev.preventDefault(); ev.currentTarget.classList.add("dragover"); }
function onDragLeave(ev){ ev.currentTarget.classList.remove("dragover"); }

function onDrop(ev, stationKey){
  ev.preventDefault();
  ev.currentTarget.classList.remove("dragover");
  if(!dragPumpId) return;

  const movingPump = findPump(dragPumpId);
  const targetStation = findStationByKey(stationKey);
  if(!movingPump || !targetStation) return;

  const currentStation = findStationByKey(movingPump.stationKey);
  const targetPumpId = targetStation.pumpId;

  // swap if occupied
  if(targetPumpId && targetPumpId !== movingPump.id){
    const targetPump = findPump(targetPumpId);

    addPumpEvent(targetPump.id, "MOVE", "", `Moved (swap) to ${currentStation.key}`, {
      from: targetStation.key,
      to: currentStation.key
    });

    targetPump.stationKey = currentStation.key;
    currentStation.pumpId = targetPump.id;
  }

  // move
  addPumpEvent(movingPump.id, "MOVE", "", `Moved to ${targetStation.key}`, {
    from: movingPump.stationKey,
    to: targetStation.key
  });

  movingPump.stationKey = targetStation.key;
  targetStation.pumpId = movingPump.id;

  if(currentStation && currentStation.key !== targetStation.key){
    if(targetPumpId && targetPumpId !== movingPump.id){
      // swapped; currentStation already set
    } else {
      currentStation.pumpId = null;
    }
  }

  save();
  render(); // needed so station headers update and card moves
  renderTopPanels();
}

/* ------------------ EXPORTS ------------------ */
function csvEscape(val){
  const s = String(val ?? "");
  if(/[",\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
  return s;
}

function exportCSV(){
  const rows = [];
  rows.push([
    "Stage",
    "ShiftStartedAt","ShiftSeatChanges","ShiftValveChanges","ShiftPackingChanges",
    "StationNum","StationKey","Side","StationLocationName",
    "PumpID","PumpName",
    "Status","StatusBy","StatusAt","StatusComment",
    "TotalPumpHours",
    "ShiftPumpSeatChanges","ShiftPumpValveChanges","ShiftPumpPackingChanges",
    "OverdueCount","DueSoonCount",
    "Seat1Hours","Seat2Hours","Seat3Hours","Seat4Hours","Seat5Hours",
    "Valve1Hours","Valve2Hours","Valve3Hours","Valve4Hours","Valve5Hours",
    "Packing1Hours","Packing2Hours","Packing3Hours","Packing4Hours","Packing5Hours"
  ]);

  state.pumps.forEach(p => {
    const st = findStationByKey(p.stationKey);
    const warn = classifyMaintenance(p);

    const row = [
      state.stage.number,
      nowStr(state.shift.startedAt),
      state.shift.seats, state.shift.valves, state.shift.packings,
      st?.stationNum ?? "", st?.key ?? p.stationKey, st?.side ?? "", st?.name ?? "",
      p.id, p.pumpName || "",
      p.status, p.statusBy || "",
      p.statusAt ? nowStr(p.statusAt) : "",
      p.statusComment || "",
      fmt(currentTotal(p)),
      p.shiftCounts.seats, p.shiftCounts.valves, p.shiftCounts.packings,
      warn.overdue, warn.soon
    ];

    p.seats.forEach(it => row.push(fmt(it.hours)));
    p.valves.forEach(it => row.push(fmt(it.hours)));
    p.packings.forEach(it => row.push(fmt(it.hours)));

    rows.push(row);
  });

  const csv = rows.map(r => r.map(csvEscape).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `pump-tracker-export-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportLogsCSV(){
  const rows = [];
  rows.push(["PumpID","PumpName","StationKey","Stage","Time","Type","By","Comment","DetailsJSON"]);

  state.pumps.forEach(p => {
    const stKey = p.stationKey || "";
    const pName = p.pumpName || "";
    p.events.forEach(e => {
      rows.push([
        p.id,
        pName,
        stKey,
        e.stage,
        nowStr(e.ts),
        e.type,
        e.by || "",
        e.comment || "",
        JSON.stringify(e.details || {})
      ]);
    });
  });

  const csv = rows.map(r => r.map(csvEscape).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `pump-tracker-LOGS-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ------------------ RENDER ------------------ */
function statusClass(p){
  if(p.status === "Running") return "running";
  if(p.status === "Offline") return "offline";
  if(p.status === "PulledOut") return "pulled";
  return "";
}
function warningClass(p){
  const w = classifyMaintenance(p);
  if(w.overdue > 0) return "warnover";
  if(w.soon > 0) return "warnsoon";
  return "";
}

function renderComponentBox(p, group, title){
  const items = p[group].map((it, idx) => {
    const changed = it.lastChangedAt ? `last: ${it.lastChangedBy || "?"} @ ${nowStr(it.lastChangedAt)}` : "";
    return `
      <div class="item">
        <div class="left">
          <input type="checkbox" ${it.active ? "checked" : ""} onchange="toggleActive(${p.id}, '${group}', ${idx}, this.checked)">
          <div class="name">${it.name}</div>
          <div class="tiny">${fmt(it.hours)}h</div>
        </div>
        <button onclick="resetItem(${p.id}, '${group}', ${idx})">Reset</button>
      </div>
      <div class="tiny muted" style="margin:-2px 0 6px 28px;">
        ${changed}${it.lastComment ? ` • note: ${it.lastComment}` : ""}
      </div>
    `;
  }).join("");

  return `
    <div class="box">
      <div class="box-title">${title}</div>
      ${items}
    </div>
  `;
}

function renderPumpCard(p){
  const totalNow = currentTotal(p);
  const w = classifyMaintenance(p);

  const pumpLabel = p.pumpName ? p.pumpName : `Pump ${p.id}`;
  const recent = p.events.slice(0, 5).map(e => `
    <div class="logline">
      <div><strong>Stage ${e.stage}</strong> • ${e.type} • ${nowStr(e.ts)}</div>
      <div class="muted">${e.by ? `by ${e.by} • ` : ""}${e.comment || ""}</div>
    </div>
  `).join("");

  return `
    <div class="pump-card ${statusClass(p)} ${warningClass(p)}" draggable="true"
         ondragstart="onDragStart(${p.id})" ondragend="onDragEnd()">

      <div><strong>${pumpLabel}</strong> <span class="muted">• (ID ${p.id})</span></div>

      <input class="pump-name-input"
             value="${p.pumpName || ""}"
             oninput="editPumpName(${p.id}, this.value)"
             placeholder="Pump name / SN / asset tag (moves with pump)">

      <div>Status: <strong>${p.status}</strong> <span class="muted">${p.statusBy ? `• by ${p.statusBy}` : ""}</span></div>
      ${p.statusComment ? `<div class="tiny muted">Note: ${p.statusComment}</div>` : ""}
      <div>Total Hours: <strong id="totalHours-${p.id}">${fmt(totalNow)}</strong></div>
      <div class="tiny muted">Stage: ${state.stage.number} • Maintenance: Overdue ${w.overdue} • Due soon ${w.soon}</div>

      <div class="row">
        <button onclick="setStatus(${p.id}, 'Stopped')">Stopped</button>
        <button onclick="setStatus(${p.id}, 'Offline')">Offline</button>
        <button onclick="setStatus(${p.id}, 'PulledOut')">Pulled Out</button>
        <button onclick="backOnline(${p.id})">Back Online</button>
      </div>

      <div class="maint">
        <div class="tiny">Maintenance (only checked items accrue hours while running) • Shift changes: S ${p.shiftCounts.seats} / V ${p.shiftCounts.valves} / P ${p.shiftCounts.packings}</div>
        <div class="maint-grid">
          ${renderComponentBox(p, "seats", "Seats (5)")}
          ${renderComponentBox(p, "valves", "Valves (5)")}
          ${renderComponentBox(p, "packings", "Packings (5)")}
        </div>
        <div class="tiny muted" style="margin-top:6px;">
          Thresholds: Seat ${THRESH.seat}h • Valve ${THRESH.valve}h • Packing ${THRESH.packing}h • Warn ${WARN_WINDOW}h
        </div>
      </div>

      <div class="logbox">
        <div class="tiny muted" style="margin-bottom:6px;">Recent History (saved)</div>
        ${recent || `<div class="tiny muted">No events yet.</div>`}
      </div>
    </div>
  `;
}

function renderStation(station){
  const pump = station.pumpId ? findPump(station.pumpId) : null;
  const pumpDisplay = pump ? (pump.pumpName ? pump.pumpName : `Pump ${pump.id}`) : "— empty —";

  const headerTitle = station.stationNum
    ? `${station.side.toUpperCase()} • STATION ${station.stationNum}`
    : `${station.side.toUpperCase()} • STANDBY`;

  return `
    <div class="station">
      <div class="station-header">
        <div>
          <div class="station-title">${headerTitle}</div>
          <div class="station-current">Current Pump: <strong id="currentPump-${station.key}">${pumpDisplay}</strong></div>
        </div>
        <div class="station-meta">${station.key}</div>
      </div>

      <input class="station-name-input"
             value="${station.name}"
             oninput="editStationName('${station.key}', this.value)"
             placeholder="Station/location name (fixed to station)">

      <div class="dropzone"
        ondragover="onDragOver(event)"
        ondragleave="onDragLeave(event)"
        ondrop="onDrop(event, '${station.key}')">

        ${pump ? renderPumpCard(pump) : `<div class="tiny muted">Drop a pump card here</div>`}
      </div>
    </div>
  `;
}

function renderTopPanels(){
  const shiftEl = document.getElementById("shiftSummary");
  const shiftMeta = document.getElementById("shiftMeta");
  shiftEl.innerHTML = `
    <span>Seats changed: <strong>${state.shift.seats}</strong></span>
    <span>Valves changed: <strong>${state.shift.valves}</strong></span>
    <span>Packings changed: <strong>${state.shift.packings}</strong></span>
  `;
  shiftMeta.textContent = `Shift started: ${nowStr(state.shift.startedAt)} • Export includes shift totals.`;

  const stageEl = document.getElementById("stageSummary");
  const stageMeta = document.getElementById("stageMeta");
  stageEl.innerHTML = `
    <span>Current stage: <strong>${state.stage.number}</strong></span>
    <span>Stage notes: <strong>${state.stage.notes.length}</strong></span>
  `;
  const lastNote = state.stage.notes[0];
  stageMeta.textContent = lastNote
    ? `Last note (Stage ${lastNote.stage}): ${lastNote.comment} — ${lastNote.by || "?"} @ ${nowStr(lastNote.ts)}`
    : `No stage notes yet. Use “Stage Note” to log what happened.`;
}

function render(){
  const lowEl = document.getElementById("lowStations");
  const highEl = document.getElementById("highStations");

  // low side shows: low main + low standby
  lowEl.innerHTML = [...state.stations.lowMain, ...state.stations.lowStandby].map(renderStation).join("");

  // high side shows: high main + high standby
  highEl.innerHTML = [...state.stations.highMain, ...state.stations.highStandby].map(renderStation).join("");

  renderTopPanels();
}

/* ✅ live totals only (smooth typing) */
function updateLiveTotalsOnly(){
  state.pumps.forEach(p => {
    if(!p.running) return;
    const el = document.getElementById(`totalHours-${p.id}`);
    if(el) el.textContent = fmt(currentTotal(p));
  });
}

/* ------------------ RECONCILE ------------------ */
function reconcile(){
  // station->pump consistency
  allStations().forEach(st => {
    if(st.pumpId){
      const p = findPump(st.pumpId);
      if(p) p.stationKey = st.key;
    }
  });
  // pump->station safety: if missing, park it in first available standby slot
  state.pumps.forEach(p => {
    if(!p.stationKey || !findStationByKey(p.stationKey)){
      // try to place into any empty standby station on the same side by pump id
      const empty = allStations().find(s => !s.pumpId);
      if(empty){
        empty.pumpId = p.id;
        p.stationKey = empty.key;
      }
    }
  });
  save();
}

/* ------------------ RESET ALL ------------------ */
function resetAllData(){
  const ok = confirm("This wipes saved data on THIS browser and resets defaults. Continue?");
  if(!ok) return;
  localStorage.removeItem(STORAGE_KEY);
  state = {
    pumps: Array.from({length: pumpCount}, (_, i) => createPump(i+1)),
    stations: createStations(),
    stage: { number: 1, notes: [] },
    shift: { startedAt: Date.now(), seats: 0, valves: 0, packings: 0 },
    globalEvents: []
  };
  reconcile();
  render();
}

/* ------------------ INIT ------------------ */
load();
reconcile();
render();
setInterval(updateLiveTotalsOnly, 1000);
</script>
