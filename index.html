<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pump Tracker</title>
  <style>
    :root {
      --bg: #111;
      --panel: #1a1a1a;
      --panel2: #202020;
      --border: #333;
      --text: #fff;
      --muted: #aaa;
      --low: #3b82f6;
      --high: #f59e0b;
      --run: #22c55e;
      --off: #eab308;
      --pull: #ef4444;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 16px; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
    h1 { text-align: center; margin: 0 0 6px; }
    .sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 14px; }
    .toolbar, .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .toolbar { justify-content: center; margin-bottom: 12px; }
    button, select, input, textarea {
      background: #151515;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
    }
    button, select { padding: 8px 10px; cursor: pointer; }
    input, textarea { width: 100%; padding: 8px; }
    textarea { min-height: 58px; resize: vertical; }
    .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
    .card-title { font-weight: bold; margin-bottom: 8px; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .side { background: var(--panel); border: 2px solid var(--border); border-radius: 12px; padding: 10px; }
    .side.low { border-color: var(--low); }
    .side.high { border-color: var(--high); }
    .side-title { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
    .stations { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .station { background: var(--panel2); border: 1px solid var(--border); border-radius: 12px; padding: 10px; min-height: 200px; }
    .station-header { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .station-title { font-size: 13px; font-weight: bold; line-height: 1.3; }
    .station-key, .tiny, .muted { color: var(--muted); font-size: 11px; }
    .station-current { color: var(--muted); font-size: 11px; margin-top: 4px; }
    .dropzone { border: 1px dashed #444; border-radius: 10px; background: #141414; padding: 8px; min-height: 110px; }
    .pump-card { background: #1d1d1d; border: 1px solid var(--border); border-radius: 12px; padding: 10px; }
    .pump-card.running { border-color: var(--run); box-shadow: 0 0 0 1px var(--run) inset; }
    .pump-card.offline { border-color: var(--off); }
    .pump-card.pulled { border-color: var(--pull); }
    .pump-card.warn { box-shadow: 0 0 0 1px #facc15 inset; }
    .pump-card.overdue { box-shadow: 0 0 0 1px #ef4444 inset; }
    .section { margin-top: 10px; background: #141414; border: 1px solid var(--border); border-radius: 10px; padding: 8px; }
    .section-title { font-size: 12px; font-weight: bold; margin-bottom: 8px; }
    .item { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #262626; }
    .item:last-child { border-bottom: none; }
    .left { display: flex; gap: 8px; align-items: center; min-width: 0; }
    .name { max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history { max-height: 140px; overflow: auto; }
    .history-line { border-bottom: 1px solid #262626; padding: 6px 0; font-size: 11px; }
    .history-line:last-child { border-bottom: none; }
    .footer { text-align: center; color: #777; font-size: 11px; margin-top: 12px; }
    @media (max-width: 1100px) {
      .summary, .layout { grid-template-columns: 1fr; }
      .stations { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1>Frac Pump Tracker</h1>
  <div class="sub">Stable rebuild with seats, valves, hard and soft packings, and fuel filters</div>

  <div class="toolbar">
    <button onclick="startAll()">Start ALL</button>
    <button onclick="stopAll()">Stop ALL</button>
    <button onclick="newShift()">Start New Shift</button>
    <button onclick="stagePrev()">Stage -</button>
    <button onclick="stageNext()">Stage +</button>
    <button onclick="stageNote()">Stage Note</button>
    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="exportLogsCSV()">Export Logs CSV</button>
    <button onclick="resetAllData()">Reset Data</button>
  </div>

  <div class="summary">
    <div class="card">
      <div class="card-title">Shift Summary</div>
      <div id="shiftSummary"></div>
      <div class="tiny" id="shiftMeta"></div>
    </div>
    <div class="card">
      <div class="card-title">Stage Summary</div>
      <div id="stageSummary"></div>
      <div class="tiny" id="stageMeta"></div>
    </div>
  </div>

  <div class="layout">
    <div class="side low">
      <div class="side-title">LOW SIDE</div>
      <div class="stations" id="lowStations"></div>
    </div>
    <div class="side high">
      <div class="side-title">HIGH SIDE</div>
      <div class="stations" id="highStations"></div>
    </div>
  </div>

  <div class="footer">Station titles update with station names. Pump names move with the pump.</div>

  <script>
    var STORAGE_KEY = 'pump_tracker_stable_rebuild_v3';
    var MAIN_STATIONS_PER_SIDE = 12;
    var STANDBY_LOW = 3;
    var STANDBY_HIGH = 3;
    var TOTAL_PUMPS = 24 + STANDBY_LOW + STANDBY_HIGH;
    var THRESH = { seat: 250, valve: 250, hardPacking: 150, softPacking: 150, fuelFilter: 150 };
    var WARN_WINDOW = 20;

    function makeItems(label, count) {
      var out = [];
      for (var i = 1; i <= count; i++) {
        out.push({ name: label + ' ' + i, hours: 0, active: true, lastChangedBy: '', lastChangedAt: null, lastComment: '' });
      }
      return out;
    }

    function buildStationTitle(station) {
      if (station.stationNum !== null && station.stationNum !== undefined) {
        return station.side.toUpperCase() + ' • STATION ' + station.stationNum + ' • ' + station.name;
      }
      return station.side.toUpperCase() + ' • STANDBY • ' + station.name;
    }

    function makePump(id) {
      return {
        id: id,
        pumpName: '',
        totalHours: 0,
        running: false,
        lastStart: null,
        status: 'Stopped',
        statusBy: '',
        statusComment: '',
        statusAt: null,
        stationKey: null,
        uiSelection: 'seats',
        currentComment: '',
        currentCommentMajor: false,
        shiftCounts: { seats: 0, valves: 0, hardPackings: 0, softPackings: 0, fuelFilters: 0 },
        seats: makeItems('Seat', 10),
        valves: makeItems('Valve', 10),
        hardPackings: makeItems('Hard Packing', 5),
        softPackings: makeItems('Soft Packing', 5),
        fuelFilters: makeItems('Fuel Filter', 6),
        events: []
      };
    }

    function makeStations() {
      var lowMain = [];
      var highMain = [];
      var lowStandby = [];
      var highStandby = [];
      var i, station;
      for (i = 1; i <= MAIN_STATIONS_PER_SIDE; i++) {
        station = { key: 'L' + i, side: 'Low', stationNum: i, name: 'Low Location ' + i, pumpId: i, displayTitle: '' };
        station.displayTitle = buildStationTitle(station);
        lowMain.push(station);
      }
      for (i = 1; i <= MAIN_STATIONS_PER_SIDE; i++) {
        station = { key: 'H' + i, side: 'High', stationNum: i + 12, name: 'High Location ' + i, pumpId: i + 12, displayTitle: '' };
        station.displayTitle = buildStationTitle(station);
        highMain.push(station);
      }
      for (i = 1; i <= STANDBY_LOW; i++) {
        station = { key: 'LSB' + i, side: 'Low', stationNum: null, name: 'Low Standby ' + i, pumpId: 24 + i, displayTitle: '' };
        station.displayTitle = buildStationTitle(station);
        lowStandby.push(station);
      }
      for (i = 1; i <= STANDBY_HIGH; i++) {
        station = { key: 'HSB' + i, side: 'High', stationNum: null, name: 'High Standby ' + i, pumpId: 24 + STANDBY_LOW + i, displayTitle: '' };
        station.displayTitle = buildStationTitle(station);
        highStandby.push(station);
      }
      return { lowMain: lowMain, highMain: highMain, lowStandby: lowStandby, highStandby: highStandby };
    }

    var state = {
      pumps: Array.from({ length: TOTAL_PUMPS }, function(_, i) { return makePump(i + 1); }),
      stations: makeStations(),
      stage: { number: 1, notes: [] },
      shift: { startedAt: Date.now(), seats: 0, valves: 0, hardPackings: 0, softPackings: 0, fuelFilters: 0 }
    };

    function allStations() {
      return state.stations.lowMain.concat(state.stations.highMain, state.stations.lowStandby, state.stations.highStandby);
    }

    function findStationByKey(key) {
      return allStations().find(function(s) { return s.key === key; });
    }

    function findPump(id) {
      return state.pumps.find(function(p) { return p.id === Number(id); });
    }

    function fmt(hours) {
      return (Math.round(hours * 100) / 100).toFixed(2);
    }

    function nowStr(ts) {
      return new Date(ts).toLocaleString();
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function safePatchItems(arr, label, count) {
      var i;
      if (!Array.isArray(arr) || arr.length !== count) return makeItems(label, count);
      for (i = 0; i < arr.length; i++) {
        if (arr[i].name == null) arr[i].name = label + ' ' + (i + 1);
        if (arr[i].hours == null) arr[i].hours = 0;
        if (arr[i].active == null) arr[i].active = true;
        if (arr[i].lastChangedBy == null) arr[i].lastChangedBy = '';
        if (arr[i].lastChangedAt == null) arr[i].lastChangedAt = null;
        if (arr[i].lastComment == null) arr[i].lastComment = '';
      }
      return arr;
    }

    function loadState() {
      var raw = localStorage.getItem(STORAGE_KEY);
      var parsed, stations, i, src, base, merged;
      if (!raw) return;
      try {
        parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.pumps) || !parsed.stations) return;
        state = parsed;
        if (!state.stage) state.stage = { number: 1, notes: [] };
        if (!state.stage.notes) state.stage.notes = [];
        if (!state.shift) state.shift = { startedAt: Date.now(), seats: 0, valves: 0, hardPackings: 0, softPackings: 0, fuelFilters: 0 };
        if (state.shift.fuelFilters == null) state.shift.fuelFilters = 0;
        if (!state.stations.lowMain) state.stations = makeStations();
        state.pumps = Array.from({ length: TOTAL_PUMPS }, function(_, idx) {
          base = makePump(idx + 1);
          src = parsed.pumps[idx] || {};
          merged = Object.assign({}, base, src);
          merged.shiftCounts = Object.assign({}, base.shiftCounts, src.shiftCounts || {});
          merged.seats = safePatchItems(src.seats, 'Seat', 10);
          merged.valves = safePatchItems(src.valves, 'Valve', 10);
          merged.hardPackings = safePatchItems(src.hardPackings, 'Hard Packing', 5);
          merged.softPackings = safePatchItems(src.softPackings, 'Soft Packing', 5);
          merged.fuelFilters = safePatchItems(src.fuelFilters, 'Fuel Filter', 6);
          merged.events = Array.isArray(src.events) ? src.events : [];
          return merged;
        });
        stations = allStations();
        for (i = 0; i < stations.length; i++) {
          if (!stations[i].name) stations[i].name = stations[i].stationNum != null ? stations[i].side + ' Location ' + stations[i].stationNum : stations[i].side + ' Standby';
          stations[i].displayTitle = buildStationTitle(stations[i]);
        }
      } catch (e) {
        console.error(e);
      }
    }

    function reconcile() {
      var stations = allStations();
      var i, p, empty;
      for (i = 0; i < stations.length; i++) {
        stations[i].displayTitle = buildStationTitle(stations[i]);
        if (stations[i].pumpId) {
          p = findPump(stations[i].pumpId);
          if (p) p.stationKey = stations[i].key;
        }
      }
      for (i = 0; i < state.pumps.length; i++) {
        p = state.pumps[i];
        if (!p.stationKey || !findStationByKey(p.stationKey)) {
          empty = stations.find(function(s) { return !s.pumpId; });
          if (empty) {
            empty.pumpId = p.id;
            p.stationKey = empty.key;
          }
        }
      }
      saveState();
    }

    function addPumpEvent(pumpId, type, by, comment, details) {
      var p = findPump(pumpId);
      if (!p) return;
      p.events.unshift({ ts: Date.now(), stage: state.stage.number, type: type, by: (by || '').trim(), comment: (comment || '').trim(), details: details || {} });
      if (p.events.length > 300) p.events.pop();
    }

    function currentTotal(p) {
      if (!p.running) return p.totalHours;
      return p.totalHours + (Date.now() - p.lastStart) / (1000 * 60 * 60);
    }

    function addRunHours(p, hours) {
      var groups = ['seats', 'valves', 'hardPackings', 'softPackings', 'fuelFilters'];
      var g, idx;
      p.totalHours += hours;
      for (g = 0; g < groups.length; g++) {
        for (idx = 0; idx < p[groups[g]].length; idx++) {
          if (p[groups[g]][idx].active) p[groups[g]][idx].hours += hours;
        }
      }
    }

    function classifyMaintenance(p) {
      var overdue = 0;
      var soon = 0;
      function check(arr, thresh) {
        var i, rem;
        for (i = 0; i < arr.length; i++) {
          if (!arr[i].active) continue;
          rem = thresh - arr[i].hours;
          if (rem <= 0) overdue += 1;
          else if (rem <= WARN_WINDOW) soon += 1;
        }
      }
      check(p.seats, THRESH.seat);
      check(p.valves, THRESH.valve);
      check(p.hardPackings, THRESH.hardPacking);
      check(p.softPackings, THRESH.softPacking);
      check(p.fuelFilters, THRESH.fuelFilter);
      return { overdue: overdue, soon: soon };
    }

    function startAll() {
      var i, p;
      for (i = 0; i < state.pumps.length; i++) {
        p = state.pumps[i];
        if (p.status !== 'Offline' && p.status !== 'PulledOut' && !p.running) {
          p.running = true;
          p.lastStart = Date.now();
          p.status = 'Running';
          addPumpEvent(p.id, 'START', '', '', {});
        }
      }
      saveState();
      render();
    }

    function stopAll() {
      var i, p, hrs;
      for (i = 0; i < state.pumps.length; i++) {
        p = state.pumps[i];
        if (!p.running) continue;
        hrs = (Date.now() - p.lastStart) / (1000 * 60 * 60);
        addRunHours(p, hrs);
        p.running = false;
        p.lastStart = null;
        if (p.status === 'Running') p.status = 'Stopped';
        addPumpEvent(p.id, 'STOP', '', '+' + fmt(hrs) + ' hrs', { addedHours: hrs });
      }
      saveState();
      render();
    }

    function newShift() {
      var by;
      if (!confirm('Start a new shift? This resets only shift counters.')) return;
      state.shift = { startedAt: Date.now(), seats: 0, valves: 0, hardPackings: 0, softPackings: 0, fuelFilters: 0 };
      state.pumps.forEach(function(p) { p.shiftCounts = { seats: 0, valves: 0, hardPackings: 0, softPackings: 0, fuelFilters: 0 }; });
      by = prompt('Who started the new shift?', '') || '';
      state.stage.notes.unshift({ ts: Date.now(), stage: state.stage.number, by: by, comment: 'New shift started' });
      saveState();
      render();
    }

    function stageNext() { state.stage.number += 1; saveState(); render(); }
    function stagePrev() { state.stage.number = Math.max(1, state.stage.number - 1); saveState(); render(); }

    function stageNote() {
      var by = prompt('Who is adding the stage note?', '') || '';
      var note = prompt('Stage ' + state.stage.number + ' note:', '') || '';
      if (!note.trim()) return;
      state.stage.notes.unshift({ ts: Date.now(), stage: state.stage.number, by: by.trim(), comment: note.trim() });
      saveState();
      render();
    }

    function editPumpName(pumpId, value) {
      var p = findPump(pumpId), st, el;
      if (!p) return;
      p.pumpName = value;
      saveState();
      st = findStationByKey(p.stationKey);
      if (st) {
        el = document.getElementById('currentPump-' + st.key);
        if (el) el.textContent = p.pumpName ? p.pumpName : 'Pump ' + p.id;
      }
    }

    function editStationName(stationKey, value) {
      var s = findStationByKey(stationKey), el;
      if (!s) return;
      s.name = value;
      s.displayTitle = buildStationTitle(s);
      saveState();
      el = document.getElementById('stationTitle-' + s.key);
      if (el) el.textContent = s.displayTitle;
    }

    function setMaintenanceView(pumpId, value) {
      var p = findPump(pumpId);
      if (!p) return;
      p.uiSelection = value;
      saveState();
      render();
    }

    function updateCurrentComment(pumpId, value) {
      var p = findPump(pumpId);
      if (!p) return;
      p.currentComment = value;
      saveState();
    }

    function updateCurrentCommentMajor(pumpId, checked) {
      var p = findPump(pumpId);
      if (!p) return;
      p.currentCommentMajor = checked;
      saveState();
    }

    function saveCommentOnly(pumpId) {
      var p = findPump(pumpId), by;
      if (!p || !p.currentComment.trim()) return;
      by = prompt('Who is saving this comment for Pump ' + p.id + '?', '') || '';
      addPumpEvent(p.id, 'COMMENT', by, p.currentComment, { majorIssue: !!p.currentCommentMajor });
      if (p.currentCommentMajor) p.statusComment = p.currentComment;
      p.currentComment = '';
      p.currentCommentMajor = false;
      saveState();
      render();
    }

    function setStatus(pumpId, status) {
      var p = findPump(pumpId), by, comment, major, hrs;
      if (!p) return;
      if (p.running && status !== 'Running') {
        hrs = (Date.now() - p.lastStart) / (1000 * 60 * 60);
        addRunHours(p, hrs);
        p.running = false;
        p.lastStart = null;
      }
      by = prompt('Who is setting Pump ' + p.id + ' to ' + status + '?', p.statusBy || '') || '';
      comment = '';
      major = false;
      if (status === 'Offline' || status === 'PulledOut') {
        comment = prompt('Reason/comment for Pump ' + p.id + ' (' + status + '):', p.currentComment || '') || '';
        major = confirm('Is this a major issue?');
      } else if (status === 'Stopped') {
        comment = prompt('Optional comment for Pump ' + p.id + ' -> Stopped:', '') || '';
      }
      p.status = status;
      p.statusBy = by.trim();
      p.statusComment = comment.trim();
      p.statusAt = Date.now();
      if (status === 'Running') {
        p.running = true;
        p.lastStart = Date.now();
      }
      addPumpEvent(p.id, 'STATUS', by, status + (comment ? ' — ' + comment : ''), { status: status, majorIssue: major });
      saveState();
      render();
    }

    function backOnline(pumpId) {
      var p = findPump(pumpId), by;
      if (!p) return;
      by = prompt('Who is putting Pump ' + p.id + ' back online?', '') || '';
      p.status = 'Stopped';
      p.statusBy = by.trim();
      p.statusComment = '';
      p.statusAt = Date.now();
      addPumpEvent(p.id, 'BACK_ONLINE', by, 'Back online', {});
      saveState();
      render();
    }

    function toggleActive(pumpId, group, idx, checked) {
      var p = findPump(pumpId);
      if (!p) return;
      p[group][idx].active = checked;
      saveState();
      render();
    }

    function incrementShift(group) {
      if (group === 'seats') state.shift.seats += 1;
      if (group === 'valves') state.shift.valves += 1;
      if (group === 'hardPackings') state.shift.hardPackings += 1;
      if (group === 'softPackings') state.shift.softPackings += 1;
      if (group === 'fuelFilters') state.shift.fuelFilters += 1;
    }

    function resetItem(pumpId, group, idx) {
      var p = findPump(pumpId), it, by, comment;
      if (!p) return;
      it = p[group][idx];
      by = prompt('Who changed ' + it.name + ' on Pump ' + p.id + '?', '') || '';
      comment = prompt('Comment for ' + it.name + ':', it.lastComment || p.currentComment || '') || '';
      it.hours = 0;
      it.lastChangedBy = by.trim();
      it.lastChangedAt = Date.now();
      it.lastComment = comment.trim();
      incrementShift(group);
      p.shiftCounts[group] += 1;
      addPumpEvent(p.id, 'MAINT_RESET', by, group + ' ' + it.name + ' reset — ' + it.lastComment, { group: group, item: it.name });
      saveState();
      render();
    }

    var dragPumpId = null;
    function onDragStart(pumpId) { dragPumpId = pumpId; }
    function onDragEnd() { dragPumpId = null; }
    function onDragOver(ev) { ev.preventDefault(); ev.currentTarget.classList.add('dragover'); }
    function onDragLeave(ev) { ev.currentTarget.classList.remove('dragover'); }

    function movePumpToStation(pumpId, stationKey) {
      var movingPump = findPump(pumpId), targetStation = findStationByKey(stationKey), currentStation, targetPumpId, targetPump;
      if (!movingPump || !targetStation) return;
      currentStation = findStationByKey(movingPump.stationKey);
      targetPumpId = targetStation.pumpId;
      if (targetPumpId && targetPumpId !== movingPump.id) {
        targetPump = findPump(targetPumpId);
        if (currentStation) {
          targetPump.stationKey = currentStation.key;
          currentStation.pumpId = targetPump.id;
        }
        addPumpEvent(targetPump.id, 'MOVE', '', 'Moved (swap) to ' + (currentStation ? currentStation.key : ''), { from: targetStation.key, to: currentStation ? currentStation.key : '' });
      }
      addPumpEvent(movingPump.id, 'MOVE', '', 'Moved to ' + targetStation.key, { from: movingPump.stationKey, to: targetStation.key });
      movingPump.stationKey = targetStation.key;
      targetStation.pumpId = movingPump.id;
      if (currentStation && currentStation.key !== targetStation.key && !(targetPumpId && targetPumpId !== movingPump.id)) {
        currentStation.pumpId = null;
      }
      saveState();
      render();
    }

    function onDrop(ev, stationKey) {
      ev.preventDefault();
      ev.currentTarget.classList.remove('dragover');
      if (!dragPumpId) return;
      movePumpToStation(dragPumpId, stationKey);
    }

    function csvEscape(value) {
      var s = String(value == null ? '' : value);
      if (s.indexOf(',') >= 0 || s.indexOf('"') >= 0 || s.indexOf('
') >= 0) {
        return '"' + s.split('"').join('""') + '"';
      }
      return s;
    }

    function downloadText(content, filename, type) {
      var blob = new Blob([content], { type: type });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function exportCSV() {
      var headers = [
        'Stage','ShiftStartedAt','ShiftSeatChanges','ShiftValveChanges','ShiftHardPackingChanges','ShiftSoftPackingChanges','ShiftFuelFilterChanges',
        'StationNum','StationKey','Side','StationName','PumpID','PumpName','Status','StatusBy','StatusAt','StatusComment',
        'MajorIssueFlag','ExcelHighlightRed','TotalPumpHours','ShiftPumpSeatChanges','ShiftPumpValveChanges','ShiftPumpHardPackingChanges','ShiftPumpSoftPackingChanges','ShiftPumpFuelFilterChanges'
      ];
      var i, rows, row, st, p, lastMajor;
      for (i = 1; i <= 10; i++) headers.push('Seat' + i + 'Hours');
      for (i = 1; i <= 10; i++) headers.push('Valve' + i + 'Hours');
      for (i = 1; i <= 5; i++) headers.push('HardPacking' + i + 'Hours');
      for (i = 1; i <= 5; i++) headers.push('SoftPacking' + i + 'Hours');
      for (i = 1; i <= 6; i++) headers.push('FuelFilter' + i + 'Hours');
      rows = [headers];
      for (i = 0; i < state.pumps.length; i++) {
        p = state.pumps[i];
        st = findStationByKey(p.stationKey);
        lastMajor = p.events.find(function(e) { return e.details && e.details.majorIssue === true; });
        row = [
          state.stage.number,
          nowStr(state.shift.startedAt),
          state.shift.seats,
          state.shift.valves,
          state.shift.hardPackings,
          state.shift.softPackings,
          state.shift.fuelFilters,
          st && st.stationNum != null ? st.stationNum : '',
          st ? st.key : p.stationKey,
          st ? st.side : '',
          st ? st.name : '',
          p.id,
          p.pumpName || '',
          p.status,
          p.statusBy || '',
          p.statusAt ? nowStr(p.statusAt) : '',
          p.statusComment || '',
          lastMajor ? 'YES' : 'NO',
          lastMajor ? 'RED' : '',
          fmt(currentTotal(p)),
          p.shiftCounts.seats,
          p.shiftCounts.valves,
          p.shiftCounts.hardPackings,
          p.shiftCounts.softPackings,
          p.shiftCounts.fuelFilters
        ];
        p.seats.forEach(function(it) { row.push(fmt(it.hours)); });
        p.valves.forEach(function(it) { row.push(fmt(it.hours)); });
        p.hardPackings.forEach(function(it) { row.push(fmt(it.hours)); });
        p.softPackings.forEach(function(it) { row.push(fmt(it.hours)); });
        p.fuelFilters.forEach(function(it) { row.push(fmt(it.hours)); });
        rows.push(row);
      }
      downloadText(rows.map(function(r) { return r.map(csvEscape).join(','); }).join('
'), 'pump-tracker-export-' + new Date().toISOString().slice(0, 10) + '.csv', 'text/csv;charset=utf-8;');
    }

    function exportLogsCSV() {
      var rows = [['PumpID','PumpName','StationKey','Stage','Time','Type','By','Comment','MajorIssueFlag','DetailsJSON']];
      state.pumps.forEach(function(p) {
        p.events.forEach(function(e) {
          rows.push([p.id, p.pumpName || '', p.stationKey || '', e.stage, nowStr(e.ts), e.type, e.by || '', e.comment || '', e.details && e.details.majorIssue ? 'YES' : 'NO', JSON.stringify(e.details || {})]);
        });
      });
      downloadText(rows.map(function(r) { return r.map(csvEscape).join(','); }).join('
'), 'pump-tracker-logs-' + new Date().toISOString().slice(0, 10) + '.csv', 'text/csv;charset=utf-8;');
    }

    function statusClass(p) {
      if (p.status === 'Running') return 'running';
      if (p.status === 'Offline') return 'offline';
      if (p.status === 'PulledOut') return 'pulled';
      return '';
    }

    function warnClass(p) {
      var w = classifyMaintenance(p);
      if (w.overdue > 0) return 'overdue';
      if (w.soon > 0) return 'warn';
      return '';
    }

    function renderItemGroup(p, group, title) {
      var html = p[group].map(function(it, idx) {
        return '<div class="item"><div class="left"><input type="checkbox" ' + (it.active ? 'checked' : '') + ' onchange="toggleActive(' + p.id + ', \'' + group + '\', ' + idx + ', this.checked)"><div class="name">' + it.name + '</div><div class="tiny">' + fmt(it.hours) + 'h</div></div><button onclick="resetItem(' + p.id + ', \'' + group + '\', ' + idx + ')">Reset</button></div>';
      }).join('');
      return '<div class="section"><div class="section-title">' + title + '</div>' + html + '</div>';
    }

    function renderSelectedMaintenance(p) {
      if (p.uiSelection === 'seats') return renderItemGroup(p, 'seats', 'Seats (10)');
      if (p.uiSelection === 'valves') return renderItemGroup(p, 'valves', 'Valves (10)');
      if (p.uiSelection === 'hardPackings') return renderItemGroup(p, 'hardPackings', 'Hard Packings (5)');
      if (p.uiSelection === 'softPackings') return renderItemGroup(p, 'softPackings', 'Soft Packings (5)');
      return renderItemGroup(p, 'fuelFilters', 'Fuel Filters (6)');
    }

    function renderPumpCard(p) {
      var label = p.pumpName ? p.pumpName : 'Pump ' + p.id;
      var warning = classifyMaintenance(p);
      var history = p.events.slice(0, 5).map(function(e) {
        return '<div class="history-line"><div><strong>Stage ' + e.stage + '</strong> • ' + e.type + ' • ' + nowStr(e.ts) + '</div><div class="muted">' + (e.by ? 'by ' + e.by + ' • ' : '') + (e.comment || '') + '</div></div>';
      }).join('');
      var options = allStations().filter(function(s) { return s.key !== p.stationKey; }).map(function(s) {
        var labelText = s.stationNum != null ? 'Station ' + s.stationNum : s.name;
        return '<option value="' + s.key + '">' + labelText + ' (' + s.key + ')</option>';
      }).join('');
      return '<div class="pump-card ' + statusClass(p) + ' ' + warnClass(p) + '" draggable="true" ondragstart="onDragStart(' + p.id + ')" ondragend="onDragEnd()">'
        + '<div><strong>' + label + '</strong> <span class="muted">• (ID ' + p.id + ')</span></div>'
        + '<input value="' + (p.pumpName || '') + '" oninput="editPumpName(' + p.id + ', this.value)" placeholder="Pump name / SN / asset tag">'
        + '<div>Status: <strong>' + p.status + '</strong> <span class="muted">' + (p.statusBy ? '• by ' + p.statusBy : '') + '</span></div>'
        + (p.statusComment ? '<div class="tiny">Latest status note: ' + p.statusComment + '</div>' : '')
        + '<div>Total Hours: <strong id="totalHours-' + p.id + '">' + fmt(currentTotal(p)) + '</strong></div>'
        + '<div class="tiny">Stage: ' + state.stage.number + ' • Overdue ' + warning.overdue + ' • Due soon ' + warning.soon + '</div>'
        + '<div class="row"><button onclick="setStatus(' + p.id + ', \"Stopped\")">Stopped</button><button onclick="setStatus(' + p.id + ', \"Offline\")">Offline</button><button onclick="setStatus(' + p.id + ', \"PulledOut\")">Pulled Out</button><button onclick="backOnline(' + p.id + ')">Back Online</button></div>'
        + '<div class="row"><select onchange="if(this.value) movePumpToStation(' + p.id + ', this.value)"><option value="">Move pump to station...</option>' + options + '</select></div>'
        + '<div class="section"><div class="section-title">Maintenance</div><div class="row"><select onchange="setMaintenanceView(' + p.id + ', this.value)"><option value="seats"' + (p.uiSelection === 'seats' ? ' selected' : '') + '>Seats</option><option value="valves"' + (p.uiSelection === 'valves' ? ' selected' : '') + '>Valves</option><option value="hardPackings"' + (p.uiSelection === 'hardPackings' ? ' selected' : '') + '>Hard Packings</option><option value="softPackings"' + (p.uiSelection === 'softPackings' ? ' selected' : '') + '>Soft Packings</option><option value="fuelFilters"' + (p.uiSelection === 'fuelFilters' ? ' selected' : '') + '>Fuel Filters</option></select><div class="tiny">Shift changes: S ' + p.shiftCounts.seats + ' • V ' + p.shiftCounts.valves + ' • HP ' + p.shiftCounts.hardPackings + ' • SP ' + p.shiftCounts.softPackings + ' • FF ' + p.shiftCounts.fuelFilters + '</div></div>' + renderSelectedMaintenance(p) + '</div>'
        + '<div class="section"><div class="section-title">Comments / Major Issues</div><textarea oninput="updateCurrentComment(' + p.id + ', this.value)" placeholder="Write a pump comment...">' + (p.currentComment || '') + '</textarea><div class="row"><label class="tiny"><input type="checkbox" ' + (p.currentCommentMajor ? 'checked' : '') + ' onchange="updateCurrentCommentMajor(' + p.id + ', this.checked)"> Mark as major issue</label><button onclick="saveCommentOnly(' + p.id + ')">Save Comment</button></div></div>'
        + '<div class="section history"><div class="section-title">Recent History</div>' + (history || '<div class="tiny">No events yet.</div>') + '</div>'
        + '</div>';
    }

    function renderStation(station) {
      var pump = station.pumpId ? findPump(station.pumpId) : null;
      var pumpLabel = pump ? (pump.pumpName ? pump.pumpName : 'Pump ' + pump.id) : '— empty —';
      return '<div class="station"><div class="station-header"><div><div class="station-title" id="stationTitle-' + station.key + '">' + station.displayTitle + '</div><div class="station-current">Current Pump: <strong id="currentPump-' + station.key + '">' + pumpLabel + '</strong></div></div><div class="station-key">' + station.key + '</div></div><input value="' + station.name + '" oninput="editStationName(\'' + station.key + '\', this.value)" placeholder="Main station / location name"><div class="dropzone" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event, \'' + station.key + '\')">' + (pump ? renderPumpCard(pump) : '<div class="tiny">Drop a pump card here</div>') + '</div></div>';
    }

    function renderTopPanels() {
      document.getElementById('shiftSummary').innerHTML = '<div class="row"><div>Seats changed: <strong>' + state.shift.seats + '</strong></div><div>Valves changed: <strong>' + state.shift.valves + '</strong></div><div>Hard packings changed: <strong>' + state.shift.hardPackings + '</strong></div><div>Soft packings changed: <strong>' + state.shift.softPackings + '</strong></div><div>Fuel filters changed: <strong>' + state.shift.fuelFilters + '</strong></div></div>';
      document.getElementById('shiftMeta').textContent = 'Shift started: ' + nowStr(state.shift.startedAt);
      document.getElementById('stageSummary').innerHTML = '<div class="row"><div>Current stage: <strong>' + state.stage.number + '</strong></div><div>Stage notes: <strong>' + state.stage.notes.length + '</strong></div></div>';
      var note = state.stage.notes[0];
      document.getElementById('stageMeta').textContent = note ? 'Last note: ' + note.comment + ' — ' + (note.by || '?') + ' @ ' + nowStr(note.ts) : 'No stage notes yet.';
    }

    function render() {
      document.getElementById('lowStations').innerHTML = state.stations.lowMain.concat(state.stations.lowStandby).map(renderStation).join('');
      document.getElementById('highStations').innerHTML = state.stations.highMain.concat(state.stations.highStandby).map(renderStation).join('');
      renderTopPanels();
    }

    function updateLiveTotalsOnly() {
      state.pumps.forEach(function(p) {
        if (!p.running) return;
        var el = document.getElementById('totalHours-' + p.id);
        if (el) el.textContent = fmt(currentTotal(p));
      });
    }

    function resetAllData() {
      if (!confirm('This wipes saved data on this browser. Continue?')) return;
      localStorage.removeItem(STORAGE_KEY);
      state = {
        pumps: Array.from({ length: TOTAL_PUMPS }, function(_, i) { return makePump(i + 1); }),
        stations: makeStations(),
        stage: { number: 1, notes: [] },
        shift: { startedAt: Date.now(), seats: 0, valves: 0, hardPackings: 0, softPackings: 0, fuelFilters: 0 }
      };
      reconcile();
      render();
    }

    loadState();
    reconcile();
    render();
    setInterval(updateLiveTotalsOnly, 1000);
  </script>
</body>
</html>
